<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Tabi</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.12.2/lottie.min.js"></script>
  <style>
    :root {
      /* Japanese palette: washi paper white, sumi-ink black, shu-iro vermillion red */
      --bg: #f7f4ee;
      --bg2: #ece2d0;
      --fg: #1a1a1a;
      --muted: #7a7266;
      --bar-bg: #e3dccb;
      --bar-fg: #c8102e;
      --bar-fg-2: #1a1a1a;
      --accent: #c8102e;
      --danger: #8b0000;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      width: 100%; min-height: 100vh;
      background: radial-gradient(1200px 800px at 50% 0%, var(--bg2), var(--bg) 65%);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      overflow-x: hidden;
    }
    #app {
      display: flex; flex-direction: column;
      align-items: center; justify-content: flex-start;
      padding: 24px 20px 40px;
      min-height: 100vh;
      gap: 18px;
    }
    #header {
      display: flex; align-items: center; justify-content: space-between;
      width: 100%; max-width: 420px;
    }
    #title {
      font-size: 18px; font-weight: 600; letter-spacing: 0.3px; color: var(--fg);
    }
    #week {
      font-size: 12px; color: var(--muted);
    }
    #status-badge {
      display: none;
      font-size: 11px;
      color: var(--danger);
      background: rgba(139,0,0,0.1);
      padding: 3px 8px; border-radius: 999px;
    }
    #status-badge.on { display: inline-block; }
    #stage {
      width: 320px; height: 320px;
      max-width: 90vw; max-height: 90vw;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.02);
      border-radius: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.12), inset 0 1px 0 rgba(0,0,0,0.04);
    }
    #lottie { width: 100%; height: 100%; }
    #bars {
      width: 100%; max-width: 420px;
      display: flex; flex-direction: column; gap: 12px;
    }
    .bar-row { display: flex; flex-direction: column; gap: 6px; }
    .bar-label {
      display: flex; justify-content: space-between;
      font-size: 12px; color: var(--muted); letter-spacing: 0.4px;
      text-transform: uppercase;
    }
    .bar-outer {
      width: 100%; height: 10px;
      background: var(--bar-bg);
      border-radius: 999px; overflow: hidden;
    }
    .bar-inner {
      height: 100%; width: 0%;
      background: var(--bar-fg);
      border-radius: 999px;
      transition: width 400ms cubic-bezier(0.4, 0, 0.2, 1), background 400ms ease;
    }
    #bar-mental .bar-inner { background: var(--bar-fg-2); }
    #caption {
      width: 100%; max-width: 420px;
      text-align: center;
      font-size: 14px; line-height: 1.4;
      color: var(--fg);
      opacity: 0.9;
      min-height: 40px;
      padding: 4px 8px;
    }
    #trip-line {
      width: 100%; max-width: 420px;
      text-align: center;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.3px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="header">
      <div id="title">Tabi Testing</div>
      <div style="display:flex;align-items:center;gap:8px;">
        <span id="status-badge">reconnecting…</span>
        <span id="week">week 0</span>
      </div>
    </div>
    <div id="stage"><div id="lottie"></div></div>
    <div id="bars">
      <div class="bar-row" id="bar-physical">
        <div class="bar-label"><span>physical</span><span class="bar-val">--</span></div>
        <div class="bar-outer"><div class="bar-inner"></div></div>
      </div>
      <div class="bar-row" id="bar-mental">
        <div class="bar-label"><span>mental</span><span class="bar-val">--</span></div>
        <div class="bar-outer"><div class="bar-inner"></div></div>
      </div>
    </div>
    <div id="caption">waking up…</div>
    <div id="trip-line"></div>
  </div>
  <script src="/webapp/app.js"></script>
</body>
</html>
