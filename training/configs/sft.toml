model = "Qwen/Qwen3.5-4B"
algorithm = "sft"                 # supervised: imitate the gold {blocker, action, message}
thinking = false                  # structured JSON output — no reasoning tokens

# Environment: publish this folder first —
#   flash env push --name phoebe-agent .
# then paste the returned id below (dry-run FAILS while this is blank).
[environment]
id = "thesix/phoebe-agent"

[train]
epochs = 1
max_examples = 2                  # starter dataset has 3 rows; raise as the generator grows
lora_rank = 32
lora_alpha = 64
