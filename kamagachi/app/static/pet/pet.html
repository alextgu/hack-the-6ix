<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Kamagachi — Pet Test Bench</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      background: linear-gradient(135deg, #2a2f3a, #3a4050);
      color: #f5e2b8;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 24px;
    }
    h1 { margin: 0; font-weight: 500; letter-spacing: 2px; }
    .stage {
      background: radial-gradient(ellipse at center, #4a5060 0%, #2a2f3a 80%);
      border-radius: 24px;
      padding: 12px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5), inset 0 0 40px rgba(0,0,0,0.3);
    }
    #pet-mount { width: 400px; height: 400px; }
    .controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      background: rgba(0,0,0,0.3);
      padding: 20px 28px;
      border-radius: 16px;
      min-width: 400px;
    }
    .row { display: flex; align-items: center; gap: 14px; width: 100%; }
    label { font-size: 13px; opacity: 0.8; letter-spacing: 1px; text-transform: uppercase; }
    input[type=range] { flex: 1; accent-color: #ffd24a; }
    .value {
      min-width: 60px; text-align: center;
      font-family: 'SF Mono', monospace;
      font-size: 22px; color: #ffd24a;
    }
    .state-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 999px;
      font-size: 12px;
      letter-spacing: 1px;
      text-transform: uppercase;
      background: rgba(255,210,74,0.2);
      color: #ffd24a;
      border: 1px solid rgba(255,210,74,0.4);
    }
    .buttons { display: flex; gap: 10px; }
    button {
      background: #ffd24a;
      color: #2a1a00;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.1s;
      letter-spacing: 0.5px;
    }
    button:hover { transform: translateY(-1px); }
    button:active { transform: translateY(0); }
    button.secondary { background: #6ac2ff; }
    button.danger { background: #ff6a6a; color: #fff; }
    .presets { display: flex; gap: 6px; flex-wrap: wrap; }
    .presets button {
      background: rgba(255,255,255,0.1);
      color: #f5e2b8;
      font-size: 11px;
      padding: 6px 10px;
    }
    .hint { font-size: 12px; opacity: 0.5; text-align: center; max-width: 400px; }
  </style>
</head>
<body>
  <h1>KAMAGACHI</h1>
  <div class="stage">
    <div id="pet-mount"></div>
  </div>

  <div class="controls">
    <div class="row">
      <label>Health</label>
      <input type="range" id="health" min="0" max="100" value="60" step="1"/>
      <div class="value" id="value">60</div>
    </div>
    <div class="row" style="justify-content: space-between;">
      <span class="state-badge" id="state-badge">stable</span>
      <div class="presets">
        <button data-h="5">dying</button>
        <button data-h="25">sick</button>
        <button data-h="55">stable</button>
        <button data-h="80">happy</button>
        <button data-h="100">golden</button>
      </div>
    </div>
    <div class="row buttons" style="justify-content: center;">
      <button id="btn-celebrate">Celebrate</button>
      <button id="btn-damage" class="danger">Damage Flash</button>
      <button id="btn-ambient" class="secondary">Toggle Ambient</button>
    </div>
    <div class="hint">Move slider or hit presets to swap states. Ambient animation runs by default.</div>
  </div>

  <script type="module">
    import { renderPet, startAmbient, stopAmbient, celebrate, damageFlash, healthToState, updateHealth }
      from './pet-animate.js';

    const mount = document.getElementById('pet-mount');
    const slider = document.getElementById('health');
    const valEl = document.getElementById('value');
    const badge = document.getElementById('state-badge');

    let ambientOn = true;

    async function boot() {
      await renderPet(mount, parseInt(slider.value, 10));
      startAmbient();
      refresh();
    }

    function refresh() {
      const h = parseInt(slider.value, 10);
      valEl.textContent = h;
      const s = healthToState(h);
      badge.textContent = s;
      updateHealth(h);
    }

    slider.addEventListener('input', refresh);

    document.querySelectorAll('.presets button').forEach(btn => {
      btn.addEventListener('click', () => {
        slider.value = btn.dataset.h;
        refresh();
      });
    });

    document.getElementById('btn-celebrate').addEventListener('click', celebrate);
    document.getElementById('btn-damage').addEventListener('click', damageFlash);
    document.getElementById('btn-ambient').addEventListener('click', () => {
      ambientOn = !ambientOn;
      if (ambientOn) startAmbient(); else stopAmbient();
    });

    boot().catch(err => {
      mount.innerHTML = `<pre style="color:#ff6a6a">Failed to load pet: ${err.message}</pre>`;
      console.error(err);
    });
  </script>
</body>
</html>
